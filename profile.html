<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>プロフィール設定</title>
<style>
  html,body{ touch-action: manipulation; -webkit-text-size-adjust:100%; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif; background:#fff4f8; color:#444; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .wrapper{ max-width:520px; margin:20px auto; padding:20px; animation:fadeUp .4s ease; }
  h2{ margin:0 0 10px 0; color:#ff5fa2; font-size:22px; text-align:center; }
  .navbar{ display:flex; justify-content:center; gap:6px; background:#fff; border-radius:12px; padding:6px; border:1px solid #ffe0eb; margin:0 0 6px; }
  .nav-btn{ flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:7px 4px; border-radius:8px; text-decoration:none; font-size:11px; color:#ccc; font-weight:bold; transition:0.2s; -webkit-tap-highlight-color:transparent; cursor:pointer; }
  .nav-btn.active{ background:#fff0f6; color:#ff5fa2; pointer-events:none; }
  .nav-ico{ font-size:18px; }
  .nav-note{ text-align:center; font-size:11px; color:#aaa; margin:0 0 20px; }
  .card{ background:#fff; padding:18px; border-radius:20px; margin-bottom:16px; box-shadow:0 4px 15px rgba(255,95,162,0.06); }
  .card-title{ font-size:15px; font-weight:bold; color:#ff5fa2; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid #ffe0eb; }
  label{ display:block; font-size:13px; font-weight:bold; color:#ff5fa2; margin:12px 0 6px; }
  .sub-label{ font-size:11px; color:#aaa; font-weight:normal; margin-left:5px; }
  input{ width:100%; padding:14px; border-radius:12px; border:1px solid #f0f0f0; font-size:16px; background:#fafafa; outline:none; appearance:none; color:#444; transition:0.2s; line-height:1.6; }
  input:focus{ border-color:#ff85b3; background:#fff; }
  ::placeholder{ color:#aaa; font-size:14px; }
  .btn-group{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .choice-btn{ padding:8px 12px; border-radius:18px; border:1px solid #ffe0eb; background:#fff; color:#666; cursor:pointer; font-size:13px; user-select:none; transition:0.2s; }
  .choice-btn:active{ transform:scale(0.95); }
  .choice-btn.active{ background:#ff5fa2; color:#fff; border-color:#ff5fa2; box-shadow:0 2px 6px rgba(255,95,162,0.3); }
  .limit-info{ font-size:12px; color:#aaa; margin-top:8px; text-align:right; }
  .limit-info.full{ color:#ff5fa2; }
  .align-group{ display:flex; gap:10px; margin-top:6px; }
  .align-btn{ flex:1; padding:12px; border-radius:12px; border:1px solid #ffe0eb; background:#fff; color:#666; cursor:pointer; font-size:14px; text-align:center; transition:0.2s; user-select:none; }
  .align-btn.active{ background:#ff5fa2; color:#fff; border-color:#ff5fa2; }
  .hint{ font-size:12px; color:#999; margin-top:8px; line-height:1.6; }
  .section-label{ font-size:11px; color:#ff85b3; font-weight:bold; margin:12px 0 6px; padding:4px 10px; background:#fff0f6; border-radius:8px; display:inline-block; }
  button.save-btn{ width:100%; padding:16px; border:none; border-radius:30px; background:linear-gradient(135deg,#ff5fa2,#ff85b3); color:white; font-size:16px; font-weight:bold; margin-top:10px; cursor:pointer; box-shadow:0 4px 12px rgba(255,95,162,0.3); transition:0.2s; }
  button.save-btn:active{ transform:scale(0.98); }
  #statusMsg{ text-align:center; font-size:14px; margin-top:12px; height:1.2em; color:#ff5fa2; font-weight:bold; }
  .logout-btn{ width:100%; padding:12px; border-radius:12px; background:#fff; color:#ff5fa2; font-size:14px; font-weight:bold; cursor:pointer; margin-top:12px; border:1px solid #ffe0eb; transition:0.2s; }
  .logout-btn:active{ background:#fff0f6; transform:scale(0.98); }
  .logout-msg{ font-size:12px; color:#ff5fa2; text-align:center; margin-top:6px; min-height:1.2em; }
  .mini-note{ font-size:12px; color:#999; margin-top:6px; }
  .divider{ width:100%; height:1px; background:#f8f0f8; margin:10px 0; }
</style>
</head>
<body>
<div class="wrapper">
  <h2>プロフィール設定</h2>
  <div class="navbar">
    <a href="index.html" class="nav-btn"><span class="nav-ico">📝</span>写メ日記</a>
    <a href="thanks.html" class="nav-btn"><span class="nav-ico">💜</span>お礼日記</a>
    <a href="profile.html" class="nav-btn active"><span class="nav-ico">⚙️</span>プロフィール</a>
  </div>
  <div class="nav-note">ボタンでページを移動してください</div>

  <div class="card">
    <div class="card-title">基本情報</div>
    <label>源氏名</label>
    <input type="text" id="name" placeholder="例：あみ">
    <label>文字の寄せ方</label>
    <div class="align-group">
      <div class="align-btn active" id="alignLeft" onclick="selectAlign('left')">← 左寄せ</div>
      <div class="align-btn" id="alignCenter" onclick="selectAlign('center')">中央揃え</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">お店のコンセプト <span class="sub-label">※1つ選択</span></div>
    <div class="btn-group" id="storeTypeBtns"></div>
  </div>

  <div class="card">
    <div class="card-title">私のキャラクター <span class="sub-label">※3つまで</span></div>
    <div class="mini-note" style="margin-bottom:10px;">性格・見た目どちらでもOK。AIの文章の味付けに使います。</div>
    <div class="section-label">性格・内面</div>
    <div class="btn-group" id="characterBtns"></div>
    <div class="divider"></div>
    <div class="section-label">見た目・スタイル</div>
    <div class="btn-group" id="traitBtns"></div>
    <div class="limit-info" id="charLimitInfo">あと 3 つ選べます</div>
  </div>

  <div class="card">
    <div class="card-title">固定文（Header / Footer）</div>
    <label>冒頭固定挨拶（Header）</label>
    <input type="text" id="headerText" placeholder="例：こんばんは💕">
    <div class="mini-note">写メ日記・お礼日記の両方に反映されます</div>
    <label>末尾固定署名（Footer）</label>
    <input type="text" id="footerText" placeholder="例：会えたら嬉しいな💕">
    <div class="mini-note">写メ日記・お礼日記の両方に反映されます</div>
  </div>

  <div class="card">
    <div class="card-title">CityHeaven 連携</div>
    <label>ログインID（女の子ID またはメールアドレス）</label>
    <input type="text" id="cityheavenId" placeholder="例：30526273">
    <label>パスワード</label>
    <input type="password" id="cityheavenPass" placeholder="パスワードを入力">
    <div class="hint">在籍店舗が変わった場合は、新しいID/PASSを入力して保存してください。</div>
    <button class="logout-btn" onclick="logoutCityHeaven()">🔓 CityHeaven をログアウト</button>
    <div class="logout-msg" id="logoutMsg"></div>
  </div>

  <button class="save-btn" onclick="saveProfile()">保存する</button>
  <div id="statusMsg"></div>
</div>

<script>
const STORE_TYPES = ["普通店","お姉さん系","妹系","清楚系","ギャル系","小悪魔系","ドS系","ドM系","天然系","クール系"];
const CHARACTERS = [
  "甘え体質","寂しがり","かまってちゃん","尽くすタイプ","独占欲強め",
  "癒やし系","聞き上手","家庭的","優しい","褒め上手",
  "ノリがいい","多趣味","マイペース","天然","ツンデレ",
  "恥ずかしがり","クール","負けず嫌い","連絡マメ",
  "小悪魔","色っぽい","ミステリアス","S気質","M気質","積極的","受け身"
];
const TRAITS = [
  "巨乳","貧乳","細身","グラマー","色白",
  "日焼け","美脚","大人の色気","ちょっぴり挑発的",
  "密着好き","お酒好き","笑顔が素敵","痴女"
];

const MAX_CHARS = 3;
let selectedStoreType  = "普通店";
let selectedCharacters = [];
let selectedAlign      = "left";

window.onload = function() {
  renderButtons("storeTypeBtns", STORE_TYPES, "storeType");
  renderButtons("characterBtns", CHARACTERS,  "character");
  renderButtons("traitBtns",     TRAITS,      "trait");
  loadProfile();
};

function renderButtons(containerId, list, type) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = "";
  list.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerText = item;
    btn.onclick = () => handleBtnClick(btn, item, type);
    container.appendChild(btn);
  });
}

function handleBtnClick(btn, item, type) {
  if (type === "storeType") {
    document.querySelectorAll("#storeTypeBtns .choice-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active"); // バグ修正：addactive → add("active")
    selectedStoreType = item;
    return;
  }
  // character / trait は同じプールで管理
  if (btn.classList.contains("active")) {
    selectedCharacters = selectedCharacters.filter(v => v !== item);
    btn.classList.remove("active");
  } else {
    if (selectedCharacters.length >= MAX_CHARS) {
      shake(btn);
      showLimitError("⚠️ 3つまでしか選べません！");
      return;
    }
    selectedCharacters.push(item);
    btn.classList.add("active");
  }
  updateLimit();
}

function updateLimit() {
  const el = document.getElementById("charLimitInfo");
  if (!el) return;
  const remaining = MAX_CHARS - selectedCharacters.length;
  if (remaining <= 0) {
    el.innerText = "MAX（これ以上選べません）";
    el.classList.add("full");
  } else {
    el.innerText = "あと " + remaining + " つ選べます";
    el.classList.remove("full");
  }
}

function showLimitError(message) {
  const el = document.getElementById("charLimitInfo");
  if (!el) return;
  el.innerText = message;
  el.classList.add("full");
  setTimeout(() => {
    el.innerText = "MAX（これ以上選べません）";
    el.classList.add("full");
  }, 1500);
}

function shake(btn) {
  btn.style.transform = "translateX(4px)";
  setTimeout(() => btn.style.transform = "translateX(-4px)", 60);
  setTimeout(() => btn.style.transform = "translateX(4px)", 120);
  setTimeout(() => btn.style.transform = "translateX(0)", 180);
}

function selectAlign(align) {
  selectedAlign = align;
  document.getElementById("alignLeft").classList.toggle("active", align === "left");
  document.getElementById("alignCenter").classList.toggle("active", align === "center");
}

function saveProfile() {
  const name = document.getElementById("name").value.trim();
  if (!name) { alert("源氏名を入力してください✨"); return; }
  const profileData = {
    name,
    storeType:  selectedStoreType,
    character:  selectedCharacters[0] || "",
    characters: selectedCharacters,
    traits:     [],
    textAlign:  selectedAlign,
  };
  localStorage.setItem("profile",        JSON.stringify(profileData));
  localStorage.setItem("diaryHeader",    document.getElementById("headerText").value);
  localStorage.setItem("diaryFooter",    document.getElementById("footerText").value);
  localStorage.setItem("cityheavenId",   document.getElementById("cityheavenId").value.trim());
  localStorage.setItem("cityheavenPass", document.getElementById("cityheavenPass").value);
  const msg = document.getElementById("statusMsg");
  msg.innerText = "保存しました✨";
  setTimeout(() => { msg.innerText = ""; }, 2000);
}

function loadProfile() {
  const saved = localStorage.getItem("profile");
  if (saved) {
    try {
      const p = JSON.parse(saved);
      document.getElementById("name").value = p.name || "";
      selectedStoreType = p.storeType || "普通店";
      document.querySelectorAll("#storeTypeBtns .choice-btn").forEach(btn => {
        if (btn.innerText === selectedStoreType) btn.classList.add("active");
      });
      // 旧characters + 旧traits を統合して読み込む
      const allSaved = [
        ...(Array.isArray(p.characters) ? p.characters : (p.character ? [p.character] : [])),
        ...(Array.isArray(p.traits) ? p.traits : [])
      ];
      const allItems = [...CHARACTERS, ...TRAITS];
      selectedCharacters = allSaved
        .map(v => String(v).trim())
        .filter(v => allItems.includes(v))
        .slice(0, MAX_CHARS);
      document.querySelectorAll("#characterBtns .choice-btn, #traitBtns .choice-btn").forEach(btn => {
        if (selectedCharacters.includes(btn.innerText)) btn.classList.add("active");
      });
      updateLimit();
      selectAlign(p.textAlign || "left");
    } catch(e) { console.error("Profile load error", e); }
  }
  document.getElementById("headerText").value    = localStorage.getItem("diaryHeader")    || "";
  document.getElementById("footerText").value    = localStorage.getItem("diaryFooter")    || "";
  document.getElementById("cityheavenId").value   = localStorage.getItem("cityheavenId")   || "";
  document.getElementById("cityheavenPass").value = localStorage.getItem("cityheavenPass") || "";
}

function logoutCityHeaven() {
  ["cityheavenId","cityheavenPass","profile_cityheavenId","profile_cityheavenPass","ch_id","ch_pass"].forEach(k => localStorage.removeItem(k));
  document.getElementById("cityheavenId").value   = "";
  document.getElementById("cityheavenPass").value = "";
  const msg = document.getElementById("logoutMsg");
  msg.innerText = "ログアウトしました。次回は新しいID/PASSを入力してください。";
  setTimeout(() => { msg.innerText = ""; }, 3000);
}
</script>
</body>
</html>
