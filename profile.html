<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プロフィール設定</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: #0f1115;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 20px;
      font-weight: 700;
    }

    .card {
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #dfe6ff;
    }

    label {
      display: block;
      font-size: 13px;
      margin: 12px 0 6px;
      color: #b8c0d4;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #313746;
      background: #0f131b;
      color: #ffffff;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #6ea8fe;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.6;
      color: #8d96ab;
    }

    .save-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      background: #4f7cff;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }

    .save-btn:active {
      transform: scale(0.995);
    }

    .saved {
      margin-top: 12px;
      font-size: 13px;
      color: #86efac;
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>プロフィール設定</h1>

    <div class="card">
      <div class="card-title">基本設定</div>

      <label for="girlName">名前</label>
      <input id="girlName" type="text" placeholder="例：おとは" />

      <label for="headerText">Header</label>
      <textarea id="headerText" placeholder="生成文の上に入れる固定文"></textarea>

      <label for="footerText">Footer</label>
      <textarea id="footerText" placeholder="生成文の下に入れる固定文"></textarea>
    </div>

    <div class="card">
      <div class="card-title">CityHeaven 連携</div>

      <label for="cityheavenId">ログインID（女の子ID または メールアドレス）</label>
      <input id="cityheavenId" type="text" placeholder="例：girl12345 / sample@example.com" />

      <label for="cityheavenPass">パスワード</label>
      <input id="cityheavenPass" type="password" placeholder="パスワードを入力" />

      <div class="hint">
        出勤情報の取得に使います。<br>
        現段階ではこの端末の localStorage に保存します。
      </div>
    </div>

    <button class="save-btn" id="saveBtn">保存する</button>
    <div class="saved" id="savedMsg">保存しました</div>
  </div>

  <script>
    const STORAGE_KEYS = {
      girlName: "profile_girlName",
      headerText: "profile_headerText",
      footerText: "profile_footerText",
      cityheavenId: "profile_cityheavenId",
      cityheavenPass: "profile_cityheavenPass"
    };

    function loadProfile() {
      document.getElementById("girlName").value = localStorage.getItem(STORAGE_KEYS.girlName) || "";
      document.getElementById("headerText").value = localStorage.getItem(STORAGE_KEYS.headerText) || "";
      document.getElementById("footerText").value = localStorage.getItem(STORAGE_KEYS.footerText) || "";
      document.getElementById("cityheavenId").value = localStorage.getItem(STORAGE_KEYS.cityheavenId) || "";
      document.getElementById("cityheavenPass").value = localStorage.getItem(STORAGE_KEYS.cityheavenPass) || "";
    }

    function saveProfile() {
      localStorage.setItem(STORAGE_KEYS.girlName, document.getElementById("girlName").value);
      localStorage.setItem(STORAGE_KEYS.headerText, document.getElementById("headerText").value);
      localStorage.setItem(STORAGE_KEYS.footerText, document.getElementById("footerText").value);
      localStorage.setItem(STORAGE_KEYS.cityheavenId, document.getElementById("cityheavenId").value);
      localStorage.setItem(STORAGE_KEYS.cityheavenPass, document.getElementById("cityheavenPass").value);

      const savedMsg = document.getElementById("savedMsg");
      savedMsg.style.display = "block";

      clearTimeout(window.__savedTimer);
      window.__savedTimer = setTimeout(() => {
        savedMsg.style.display = "none";
      }, 1800);
    }

    document.getElementById("saveBtn").addEventListener("click", saveProfile);
    window.addEventListener("DOMContentLoaded", loadProfile);
  </script>
</body>
</html>
