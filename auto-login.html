<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CityHeaven 自動ログイン</title>
<style>
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif; background:#fff4f8; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .box{ text-align:center; padding:40px 20px; }
  .icon{ font-size:48px; margin-bottom:16px; }
  .msg{ font-size:16px; color:#ff5fa2; font-weight:bold; margin-bottom:8px; }
  .sub{ font-size:13px; color:#aaa; }
  .btn{ display:inline-block; margin-top:20px; padding:12px 24px; background:#ff5fa2; color:#fff; border-radius:20px; text-decoration:none; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div class="box">
  <div class="icon" id="icon">⏳</div>
  <div class="msg" id="msg">CityHeaven に接続中...</div>
  <div class="sub" id="sub">しばらくお待ちください</div>
  <div id="linkArea"></div>
</div>

<script>
const WORKER_URL = "https://openrouter-diary-api.doropbox-kyoto.workers.dev";

async function run() {
  const icon   = document.getElementById("icon");
  const msg    = document.getElementById("msg");
  const sub    = document.getElementById("sub");
  const linkArea = document.getElementById("linkArea");

  // ★ログアウト確認：認証情報がない場合はプロフィールへ誘導
  const id   = localStorage.getItem("cityheavenId")   || localStorage.getItem("profile_cityheavenId")   || "";
  const pass = localStorage.getItem("cityheavenPass") || localStorage.getItem("profile_cityheavenPass") || "";

  if (!id || !pass) {
    icon.innerText = "⚠️";
    msg.innerText  = "ログイン情報がありません";
    sub.innerText  = "プロフィール設定からID/PASSを登録してください";
    linkArea.innerHTML = '<a href="profile.html" class="btn">プロフィール設定へ</a>';
    return;
  }

  try {
    // tranparamを取得
    const res  = await fetch(WORKER_URL + "/get-tranparam", { method: "GET" });
    const data = await res.json();

    if (!data.ok || !data.tranparam) {
      throw new Error("tranparam取得失敗");
    }

    // フォームを作成してCityHeavenへPOST
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "https://spgirl.cityheaven.net/J1Login.php";

    const fields = {
      txt_account: id,
      txt_password: pass,
      login: "ログイン",
      tranparam: data.tranparam
    };

    Object.entries(fields).forEach(([name, value]) => {
      const input = document.createElement("input");
      input.type  = "hidden";
      input.name  = name;
      input.value = value;
      form.appendChild(input);
    });

    document.body.appendChild(form);
    form.submit();

  } catch(e) {
    icon.innerText = "❌";
    msg.innerText  = "接続に失敗しました";
    sub.innerText  = "時間をおいて再度お試しください";
    linkArea.innerHTML = '<a href="profile.html" class="btn">プロフィール設定へ</a>';
  }
}

run();
</script>
</body>
</html>
