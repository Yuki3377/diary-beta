<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI写メ日記作成</title>
<style>
/* 基本設定 (profile.htmlと共通) */
html,body{ touch-action: manipulation; -webkit-text-size-adjust:100%; }
*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif; background:#fff4f8; color:#444; }

.wrapper{ max-width:520px; margin:30px auto; padding:20px; animation:fadeUp .4s ease; }
@keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

h2{ margin-bottom:20px; color: #ff5fa2; text-align: center; font-size: 22px; }

/* カードデザイン */
.card{ background:#fff; padding:20px; border-radius:20px; margin-bottom:16px; box-shadow:0 4px 15px rgba(255,95,162,0.06); }

/* ラベル設定 */
.label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
label{ font-size: 14px; font-weight: bold; color: #ff5fa2; }
.sub-label { font-size: 11px; color: #aaa; font-weight: normal; }

/* 入力欄 */
input, textarea, select {
  width:100%; padding:14px; border-radius:12px; border:1px solid #f0f0f0;
  font-size:16px; background: #fafafa; outline: none; appearance: none;
  color: #444; transition: 0.2s; font-family: inherit;
}
input:focus, textarea:focus, select:focus { border-color: #ff85b3; background: #fff; }
textarea { resize: none; height: 100px; }

/* 気分ボタンエリア */
.mood-group { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
.mood-btn {
  flex: 0 0 auto; padding: 10px 16px; border-radius: 20px; border: 1px solid #ffe0eb;
  background: #fff; font-size: 13px; cursor: pointer; transition: 0.2s;
  color: #666; white-space: nowrap;
}
.mood-btn.active {
  background: #ff5fa2; color: #fff; border-color: #ff5fa2;
  box-shadow: 0 2px 6px rgba(255,95,162,0.3);
}

/* 生成ボタン */
button.generate-btn {
  width:100%; padding:16px; border:none; border-radius:30px;
  background:linear-gradient(135deg,#ff5fa2,#ff85b3);
  color:white; font-size:16px; font-weight:bold; margin-top:10px;
  cursor: pointer; box-shadow: 0 4px 12px rgba(255,95,162,0.3);
  transition: 0.2s; position: relative; overflow: hidden;
}
button.generate-btn:active { transform: scale(0.98); }
button.generate-btn:disabled { opacity: 0.7; cursor: not-allowed; }

/* 結果表示エリア */
#resultArea { margin-top: 30px; display: none; }
.result-box {
  background: #fff; padding: 25px; border-radius: 20px;
  box-shadow: 0 4px 15px rgba(255,95,162,0.1);
  border: 2px solid #ffe0eb;
  font-size: 16px; line-height: 1.8; color: #333;
  white-space: pre-wrap; /* 改行を反映 */
}

/* 設定リンク */
.setting-link {
  text-align: center; margin-top: 30px;
}
.setting-link a {
  color: #aaa; text-decoration: none; font-size: 12px; border-bottom: 1px solid #ddd;
}

/* 読み込みアニメーション */
.spinner {
  display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite;
  margin-right: 8px; vertical-align: middle; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

<div class="wrapper">
  <h2>AI写メ日記</h2>

  <div class="card">
    <div class="label-row">
      <label>日記のタイトル</label>
      <span class="sub-label">（AIの文章にも反映されます）</span>
    </div>
    <input type="text" id="topic" placeholder="例：久々の美容室✨">
  </div>

  <div class="card">
    <label>日記の状況・写真の内容</label>
    <textarea id="detail" placeholder="例：表参道のカフェでパンケーキ食べた！めっちゃ並んだけど美味しかった〜"></textarea>
  </div>

  <div class="card">
    <label>今の気分</label>
    <div class="mood-group" id="moodGroup">
      <button class="mood-btn" onclick="selectMood(this, 'ハッピー')">ハッピー🥰</button>
      <button class="mood-btn" onclick="selectMood(this, '疲れた')">疲れた💦</button>
      <button class="mood-btn" onclick="selectMood(this, 'まったり')">まったり🍵</button>
      <button class="mood-btn" onclick="selectMood(this, 'かまって')">かまって🥺</button>
      <button class="mood-btn" onclick="selectMood(this, 'おこ')">おこ💢</button>
    </div>
  </div>

  <button class="generate-btn" id="genBtn" onclick="generateDiary()">
    <span class="spinner" id="spinner"></span>
    <span id="btnText">日記をつくる ✨</span>
  </button>

  <div id="resultArea">
    <div class="label-row" style="margin-top:10px; margin-bottom:5px; padding:0 10px;">
      <label>完成した日記</label>
      <span class="sub-label" id="copyMsg">タップしてコピー</span>
    </div>
    <div class="result-box" id="resultText" onclick="copyText()"></div>
  </div>

  <div class="setting-link">
    <a href="profile.html">プロフィール設定を変更する</a>
  </div>
</div>

<script>
let selectedMood = "";
let userProfile = {};

// ページ読み込み時にプロフィール取得
window.onload = function() {
  const saved = localStorage.getItem("profile");
  if (saved) {
    userProfile = JSON.parse(saved);
  } else {
    // プロフィールがない場合は設定画面へ誘導などの処理も可能
    console.log("プロフィール未設定");
  }
};

// 気分選択
function selectMood(btn, mood) {
  // 既存の選択解除
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  // 選択反映
  btn.classList.add('active');
  selectedMood = mood;
}

// 日記生成実行
async function generateDiary() {
  // プロフィール未設定時のデフォルト値
  const profileData = userProfile || { 
    name: "私", character: "お姉さん系", textAlign: "left" 
  };

  const topic = document.getElementById("topic").value;
  const detail = document.getElementById("detail").value;

  if (!detail && !topic) {
    alert("タイトルか状況を入力してください💦");
    return;
  }

  // UIをロード中に変更
  const btn = document.getElementById("genBtn");
  const spinner = document.getElementById("spinner");
  const btnText = document.getElementById("btnText");
  
  btn.disabled = true;
  spinner.style.display = "inline-block";
  btnText.innerText = "考え中...";
  document.getElementById("resultArea").style.display = "none";

  try {
    // ★重要: ここはあなたのCloudflare WorkersのURLに書き換えてください
    const API_URL = "https://diary-beta.pages.dev/api/generate"; // 仮のパス
    // もしくは前のスクリーンショットにあったURLを使用:
    // const API_URL = "https://lucky-bush-6437.doropbox-kyoto.workers.dev/"; 

    // リクエストデータ作成 (既存のAPI構造に合わせて調整してください)
    // ここでは新しい構成に合わせて送信します
    const payload = {
      topic: topic,
      detail: detail,
      mood: selectedMood || "普通",
      profile: profileData // プロフィール情報も一緒に送ってAIに反映させる想定
    };

    // fetchでAPIを叩く
    // ※現在は動作テスト用にモック（擬似）レスポンスを返します
    // 本番ではここを fetch(API_URL, ...) に戻してください
    
    /* --- 本番用コード (コメントアウト中) ---
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await response.json();
    let generatedText = data.text || "エラーが発生しました";
    --------------------------------------- */

    // --- テスト用: 3秒後に擬似テキストを返す ---
    await new Promise(r => setTimeout(r, 2000));
    const generatedText = `${topic}に行ってきたよ！\n\n${detail}って感じでめっちゃ楽しかった〜✨\n\n${selectedMood}な気分だから、誰か癒やしてくれないかな？笑\n\n明日も頑張ろうっと！`;
    // ---------------------------------------

    // ★修正ポイント: 行間を空ける処理 (改行を2つに増やす)
    // 既に空行がある場合は重複しないように正規表現で調整
    let formattedText = generatedText.replace(/\n/g, "\n\n").replace(/\n\n\n/g, "\n\n");

    const resultBox = document.getElementById("resultText");
    resultBox.innerText = formattedText;

    // ★修正ポイント: 配置（左揃え・中央揃え）の反映
    if (profileData.textAlign === "center") {
      resultBox.style.textAlign = "center";
    } else {
      resultBox.style.textAlign = "left";
    }

    document.getElementById("resultArea").style.display = "block";
    
    // スクロール
    document.getElementById("resultArea").scrollIntoView({behavior: "smooth"});

  } catch (e) {
    alert("エラーが発生しました: " + e.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = "none";
    btnText.innerText = "日記をつくる ✨";
  }
}

// コピー機能
function copyText() {
  const text = document.getElementById("resultText").innerText;
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById("copyMsg");
    const original = msg.innerText;
    msg.innerText = "コピー
