<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>写メ日記をつくる</title>

<style>
html,body{ touch-action: manipulation; -webkit-text-size-adjust:100%; }
*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif; background:#fff4f8; color:#444; }

.wrapper{ max-width:520px; margin:30px auto; padding:20px; }

textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #f0f0f0;
  font-size:16px;
  background:#fafafa;
  line-height:1.8;
  white-space:pre-wrap;
}

button.primary{
  width:100%;
  padding:16px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ff5fa2,#ff85b3);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.result-container{ display:none; margin-top:20px; }

.modal{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(60,60,60,0.9);
  color:#fff;
  padding:16px 24px;
  border-radius:30px;
  font-size:14px;
  opacity:0;
  transition:0.3s;
}
</style>
</head>

<body>

<div class="wrapper">
  <h2>写メ日記をつくる</h2>

  <input id="title" placeholder="題名を入力">
  <button class="primary" onclick="generate()">日記をつくる</button>

  <div class="result-container" id="resultContainer">
    <textarea id="resultTextarea" rows="18"></textarea>
    <button onclick="copyText()">📋 コピー</button>
  </div>
</div>

<div id="modal" class="modal"></div>

<script>

async function generate(){

  const title = document.getElementById("title").value.trim();
  if(!title){
    showModal("題名を入力してね");
    return;
  }

  const btn = document.querySelector(".primary");
  btn.innerText = "生成中...";
  btn.disabled = true;

  try{

    const response = await fetch("https://lucky-bush-6437diary-api.doropbox-kyoto.workers.dev",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        promptType:"index",
        context:{ title:title }
      })
    });

    const data = await response.json();
    let bodyText = data.text || "";

    // ===== 改行ロジック（確定版） =====

    bodyText = bodyText.replace(/\r\n/g,"\n");

    // 文末で1段空ける
    bodyText = bodyText.replace(/([。！？!?])/g,"$1\n\n");

    // 3行以上は2行に整える
    bodyText = bodyText.replace(/\n{3,}/g,"\n\n");

    bodyText = bodyText.trim();

    // ================================

    const fullText = `【${title}】\n\n${bodyText}`;

    const textarea = document.getElementById("resultTextarea");
    textarea.value = fullText;

    document.getElementById("resultContainer").style.display="block";

  }catch(e){
    showModal("生成エラー");
  }

  btn.innerText="日記をつくる";
  btn.disabled=false;
}

function copyText(){
  const textarea=document.getElementById("resultTextarea");
  textarea.select();
  document.execCommand("copy");
  showModal("コピーしました✨");
}

function showModal(msg){
  const modal=document.getElementById("modal");
  modal.innerText=msg;
  modal.style.opacity="1";
  setTimeout(()=>{ modal.style.opacity="0"; },2000);
}

</script>

</body>
</html>
