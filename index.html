<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>写メ日記をつくる</title>
<style>
  html,body{ touch-action: manipulation; -webkit-text-size-adjust:100%; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif; background:#fff4f8; color:#444; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @keyframes popIn{ 0%{transform:scale(0.8); opacity:0;} 100%{transform:scale(1); opacity:1;} }
  .navbar{ position:sticky; top:0; z-index:100; background:#fff; border-bottom:1px solid #ffe0eb; padding:10px 16px; display:flex; justify-content:center; gap:12px; }
  .nav-btn{ padding:8px 16px; border-radius:20px; border:1px solid #ffe0eb; background:#fff; color:#ff5fa2; font-size:13px; font-weight:bold; cursor:pointer; text-decoration:none; transition:0.2s; }
  .nav-btn.active{ background:#ff5fa2; color:#fff; border-color:#ff5fa2; }
  .nav-note{ text-align:center; font-size:11px; color:#aaa; padding:6px 0; background:#fff; border-bottom:1px solid #ffe0eb; }
  .wrapper{ max-width:520px; margin:20px auto; padding:20px; animation:fadeUp .4s ease; }
  h2{ margin:0 0 10px 0; color: #ff5fa2; font-size: 22px; text-align: center; }
  .profileInfo{ font-size:13px; color:#888; margin-bottom:20px; text-align: center; min-height: 1.2em; }
  .card{ background:#fff; padding:18px; border-radius:20px; margin-bottom:16px; box-shadow:0 4px 15px rgba(255,95,162,0.06); }
  label{ font-size: 14px; font-weight: bold; color: #ff5fa2; display: block; margin-bottom: 10px; display:flex; align-items:center; justify-content:space-between; }
  .sub-label { font-size: 11px; color: #aaa; font-weight: normal; margin-left: 8px; }
  input, textarea, select { width:100%; padding:14px; border-radius:12px; border:1px solid #f0f0f0; font-size:16px; background: #fafafa; transition:0.2s; outline:none; color: #444; appearance: none; line-height: 1.6; }
  input:focus, textarea:focus, select:focus { border-color: #ff85b3; background: #fff; }
  ::placeholder { color: #aaa; font-size: 14px; }
  .button-group{ display:flex; flex-wrap:wrap; gap:8px; }
  .divider { width: 100%; height: 1px; background: #f0f0f0; margin: 10px 0; }
  .choice-btn{ padding:8px 12px; border-radius:18px; border:1px solid #ffe0eb; background:#fff; color:#666; cursor:pointer; font-size:13px; user-select:none; transition:0.2s; }
  .choice-btn:active { transform: scale(0.95); }
  .choice-btn.active{ background:#ff5fa2; color:#fff; border-color:#ff5fa2; box-shadow: 0 2px 6px rgba(255,95,162,0.3); }
  button.primary{ width:100%; padding:16px; border:none; border-radius:30px; background:linear-gradient(135deg,#ff5fa2,#ff85b3); color:white; margin-top:10px; font-size:16px; font-weight:bold; cursor:pointer; box-shadow: 0 4px 12px rgba(255, 95, 162, 0.3); transition:0.2s; }
  button.primary:active { transform: scale(0.98); }
  button.primary:disabled { background: #ddd; cursor: not-allowed; box-shadow: none; }
  .result-container { display:none; margin-top:20px; animation:popIn .3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .history{ margin-top:40px; border-top: 2px dashed #ffe0eb; padding-top: 20px; }
  .history h3 { font-size: 16px; color: #888; margin-bottom: 15px; text-align: center; }
  .history-item{ background:#fff; padding:12px 14px; border-radius:12px; margin-bottom:10px; font-size:13px; border:1px solid #f8f8f8; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
  .history-item:active { background: #fff0f6; }
  .history-text { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; color: #555; }
  .fav-btn { background: none; border: none; font-size: 18px; color: #ddd; cursor: pointer; padding: 0 0 0 10px; margin-left: 8px; transition: color 0.2s; }
  .fav-btn.active { color: #ff5fa2; }
  .modal{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(60, 60, 60, 0.9); color:#fff; padding:16px 24px; border-radius:30px; font-size:14px; opacity:0; transition:0.3s; pointer-events:none; z-index:1000; text-align:center; white-space: nowrap; }
  .mini-note { font-size: 12px; color: #999; margin-top: 6px; }
  .radio-group { display: flex; flex-direction: column; gap: 10px; }
  .radio-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #666; font-weight: normal; justify-content: flex-start; margin-bottom: 0; padding: 10px 12px; border-radius: 10px; border: 1px solid #f0f0f0; background: #fafafa; cursor: pointer; transition: 0.2s; }
  .radio-row:has(input:checked) { border-color: #ff85b3; background: #fff5f9; color: #ff5fa2; font-weight: bold; }
  .radio-row input[type="radio"] { width: auto; padding: 0; margin: 0; accent-color: #ff5fa2; }
  .schedule-hint { display: none; margin-top: 10px; padding: 10px 14px; background: #fff0f6; border-radius: 10px; font-size: 12px; color: #ff5fa2; border: 1px dashed #ffb3d0; }
  .schedule-hint.visible { display: block; }
</style>
</head>
<body>

<div class="navbar">
  <a href="index.html" class="nav-btn active">📝 写メ日記</a>
  <a href="thanks.html" class="nav-btn">💜 お礼日記</a>
  <a href="profile.html" class="nav-btn">⚙️ プロフィール</a>
</div>
<div class="nav-note">ボタンでページを移動してください</div>

<div class="wrapper">
  <h2>写メ日記をつくる</h2>
  <div class="profileInfo" id="profileInfo">読み込み中...</div>

  <div class="card">
    <label>題名</label>
    <input id="title" placeholder="例：久々の美容室（AIの文章にも反映されます）">
  </div>

  <div class="card">
    <label>冒頭固定挨拶（Header）<span class="sub-label">※一度入れたら保存されます</span></label>
    <input id="header" type="text" placeholder="例：こんばんは💕">
    <div class="mini-note">次回以降も自動で表示されます</div>
  </div>

  <div class="card">
    <label>末尾固定署名（Footer）<span class="sub-label">※一度入れたら保存されます</span></label>
    <input id="footer" type="text" placeholder="例：会えたら嬉しいな💕">
    <div class="mini-note">次回以降も自動で表示されます</div>
  </div>

  <div class="card">
    <label>日記の状況<span class="sub-label">※内容のベースになります</span></label>
    <div class="button-group" id="situationButtonsTop"></div>
    <div class="divider"></div>
    <div class="button-group" id="situationButtonsBottom"></div>
  </div>

  <div class="card">
    <label>ちょっぴり大人のスパイス<span class="sub-label">※文章の攻め具合</span></label>
    <div class="button-group" id="eroButtons"></div>
  </div>

  <div class="card">
    <label>今の気分<span class="sub-label">※スパイスに応じて切り替わります</span></label>
    <div class="button-group" id="moodButtons"></div>
  </div>

  <div class="card">
    <label>文章のボリューム<span class="sub-label">※毎回少し変動します</span></label>
    <div class="button-group" id="lengthButtons"></div>
  </div>

  <div class="card">
    <label>スケジュール告知オプション<span class="sub-label">※出勤情報を自然に組み込みます</span></label>
    <div class="radio-group">
      <label class="radio-row">
        <input type="radio" name="scheduleType" value="" checked onchange="onScheduleChange()">
        <span>追加しない</span>
      </label>
      <label class="radio-row">
        <input type="radio" name="scheduleType" value="today" onchange="onScheduleChange()">
        <span>🕐 今日の出勤</span>
      </label>
      <label class="radio-row">
        <input type="radio" name="scheduleType" value="remaining" onchange="onScheduleChange()">
        <span>⏳ 残り時間</span>
      </label>
      <label class="radio-row">
        <input type="radio" name="scheduleType" value="next" onchange="onScheduleChange()">
        <span>📅 次回出勤</span>
      </label>
      <label class="radio-row">
        <input type="radio" name="scheduleType" value="week" onchange="onScheduleChange()">
        <span>📆 今週の出勤予定</span>
      </label>
    </div>
    <div class="schedule-hint" id="scheduleHint">
      CityHeavenの出勤情報を使って文章を作ります。<br>
      プロフィール設定でID/PASSが保存済みであることを確認してください。
    </div>
    <div class="mini-note">「追加しない」以外を選ぶと、CityHeavenの出勤情報を使って文章を作ります</div>
  </div>

  <button class="primary" id="generateBtn" onclick="generate()">日記をつくる</button>

  <div class="result-container" id="resultContainer">
    <div class="card" style="background:#fff9fc; border: 2px solid #ffdeeb;">
      <label style="color:#ff5fa2;">AIが書いた日記<span class="sub-label">自由に修正してね</span></label>
      <textarea id="resultTextarea" rows="18"></textarea>
      <div class="button-group" style="margin-top:10px;">
        <button class="choice-btn" style="width:100%; text-align:center; background:#ff5fa2; color:white; border:none;" onclick="copyText()">📋 文章をコピーする</button>
      </div>
    </div>
  </div>

  <div class="history">
    <h3>最近の履歴（20件）</h3>
    <div id="historyList"></div>
  </div>
</div>

<div id="modal" class="modal"></div>

<script>
const WORKER_URL = "https://openrouter-diary-api.doropbox-kyoto.workers.dev";

const MOOD_MAP = {
  low:   ["時間あるかな？", "構って？", "癒されたい", "密着したい"],
  mid:   ["ムラムラ", "濡れてる", "イチャイチャ", "我慢できない"],
  high:  ["もっと奥まで", "止まらなくなっちゃう", "マ○コが濡れすぎて", "チ○チ○を舐めたい"],
  ultra: ["もっと奥まで", "止まらなくなっちゃう", "マ○コが濡れすぎて", "チ○チ○を舐めたい"]
};

const SITUATIONS_TOP = ["待機中", "明日出勤", "退勤"];
const SITUATIONS_BOTTOM = [
  "出勤前", "休憩中", "お休み", "美容Day", "お買い物", "ご飯",
  "お酒", "寝る前", "お散歩", "早起き", "雨の日", "旅行"
];

const ERO_LEVELS = [
  { label: "清潔感 ⭐️",          value: "low"   },
  { label: "ほんのりH ⭐️⭐️",    value: "mid"   },
  { label: "過激 ⭐️⭐️⭐️",      value: "high"  },
  { label: "過激○伏せ ⭐️⭐️⭐️", value: "ultra" }
];

const LENGTH_OPTIONS = ["短め", "長め"];

let profile = null;
let selectedMood = MOOD_MAP.low[0];
let selectedSituation = null;
let selectedEro = "low";
let selectedLength = "長め";

window.onload = function() {
  safeLoadProfile();
  loadHeaderFooter();
  createButtons(SITUATIONS_TOP, "situationButtonsTop", (v) => selectedSituation = v);
  createButtons(SITUATIONS_BOTTOM, "situationButtonsBottom", (v) => selectedSituation = v);
  createEroButtons();
  renderMoodButtons(selectedEro);
  createButtons(LENGTH_OPTIONS, "lengthButtons", (v) => selectedLength = v);
  try { migrateHistoryIfNeeded(); renderHistory(); }
  catch(e) { localStorage.removeItem("diaryHistory"); renderHistory(); }
};

function safeLoadProfile() {
  const infoDiv = document.getElementById("profileInfo");
  try {
    const saved = localStorage.getItem("profile");
    if (!saved) {
      infoDiv.innerHTML = '<a href="profile.html" style="color:#ff5fa2; text-decoration:underline;">⚠️ プロフィールを設定してください</a>';
      return;
    }
    profile = JSON.parse(saved);
    const charText = profile.character || "";
    infoDiv.innerText = profile.name + "（" + charText + "）";
    const textarea = document.getElementById("resultTextarea");
    if (profile.textAlign === "center") { textarea.style.textAlign = "center"; }
    else { textarea.style.textAlign = "left"; }
  } catch(e) {
    infoDiv.innerHTML = '<a href="profile.html" style="color:#ff5fa2; text-decoration:underline;">⚠️ プロフィールを設定し直してください</a>';
  }
}

function createButtons(list, containerId, callback) {
  const container = document.getElementById(containerId);
  if(!container) return;
  list.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerText = item;
    if (containerId === "lengthButtons" && item === "長め") btn.classList.add("active");
    btn.onclick = () => {
      if(containerId.includes("situation")) {
        document.querySelectorAll("#situationButtonsTop .choice-btn, #situationButtonsBottom .choice-btn").forEach(b => b.classList.remove("active"));
      } else {
        [...container.children].forEach(b => b.classList.remove("active"));
      }
      btn.classList.add("active");
      callback(item);
    };
    container.appendChild(btn);
  });
}

function createEroButtons() {
  const container = document.getElementById("eroButtons");
  if (!container) return;
  container.innerHTML = "";
  ERO_LEVELS.forEach((item) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerText = item.label;
    if (item.value === selectedEro) btn.classList.add("active");
    btn.onclick = () => {
      [...container.children].forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedEro = item.value;
      renderMoodButtons(selectedEro);
    };
    container.appendChild(btn);
  });
}

function renderMoodButtons(spiceLevel) {
  const container = document.getElementById("moodButtons");
  if (!container) return;
  container.innerHTML = "";
  const moods = MOOD_MAP[spiceLevel] || [];
  selectedMood = moods[0] || null;
  moods.forEach((item, index) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerText = item;
    if (index === 0) btn.classList.add("active");
    btn.onclick = () => {
      [...container.children].forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedMood = item;
    };
    container.appendChild(btn);
  });
}

function onScheduleChange() {
  const scheduleType = getSelectedScheduleType();
  const hint = document.getElementById("scheduleHint");
  if (scheduleType) { hint.classList.add("visible"); }
  else { hint.classList.remove("visible"); }
}

function getSelectedScheduleType() {
  const checked = document.querySelector('input[name="scheduleType"]:checked');
  return checked ? checked.value : "";
}

function getCityHeavenCreds() {
  const id = localStorage.getItem("cityheavenId") || localStorage.getItem("profile_cityheavenId") || localStorage.getItem("ch_id") || "";
  const pass = localStorage.getItem("cityheavenPass") || localStorage.getItem("profile_cityheavenPass") || localStorage.getItem("ch_pass") || "";
  return { id, pass };
}

function saveHeaderFooter() {
  localStorage.setItem("diaryHeader", document.getElementById("header").value);
  localStorage.setItem("diaryFooter", document.getElementById("footer").value);
}

function loadHeaderFooter() {
  const headerEl = document.getElementById("header");
  const footerEl = document.getElementById("footer");
  if (headerEl) headerEl.value = localStorage.getItem("diaryHeader") || "";
  if (footerEl) footerEl.value = localStorage.getItem("diaryFooter") || "";
  if (headerEl) headerEl.addEventListener("input", saveHeaderFooter);
  if (footerEl) footerEl.addEventListener("input", saveHeaderFooter);
}

async function generate() {
  if (!profile || !profile.name) {
    showModal("プロフィール設定がまだのようです💦");
    setTimeout(() => location.href = "profile.html", 1500);
    return;
  }
  const title = document.getElementById("title").value.trim();
  if (!title) { showModal("題名を入力してね"); return; }
  if (!selectedSituation) { showModal("日記の状況を選んでね"); return; }
  if (!selectedMood) { showModal("今の気分を選んでね"); return; }

  const scheduleType = getSelectedScheduleType();
  const { id: cityheavenId, pass: cityheavenPass } = getCityHeavenCreds();

  if (scheduleType && (!cityheavenId || !cityheavenPass)) {
    showModal("プロフィール設定でCityHeaven情報を保存してください");
    setTimeout(() => location.href = "profile.html", 2000);
    return;
  }

  const btn = document.getElementById("generateBtn");
  btn.innerText = scheduleType ? "出勤情報を取得中...📅" : "メッセージを考案中...💭";
  btn.disabled = true;

  try {
    let scheduleData = null;
    if (scheduleType) {
      const scrapeRes = await fetch(WORKER_URL + "/get-schedule-msg", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cityheavenId, cityheavenPass })
      });
      const scrapeData = await scrapeRes.json().catch(() => ({}));
      if (!scrapeData.ok) { showModal(scrapeData.message || "出勤情報の取得に失敗しました💦"); return; }
      if (scheduleType === "today" || scheduleType === "remaining") {
        const todayShift = scrapeData.todayShift || (scrapeData.nextShift?.dateLabel === "本日" ? scrapeData.nextShift : null);
        if (!todayShift) { showModal("本日の出勤情報がありません"); return; }
        scheduleData = todayShift;
      } else if (scheduleType === "next") {
        const allShifts = scrapeData.allShifts || [];
        const nextShift = allShifts.find(s => s.dateLabel !== "本日") || null;
        if (!nextShift) { showModal("次回出勤情報がありません"); return; }
        scheduleData = nextShift;
      } else if (scheduleType === "week") {
        const allShifts = scrapeData.allShifts || [];
        const weekShifts = allShifts.filter(s => s.dateLabel !== "本日").slice(0, 7);
        if (weekShifts.length === 0) { showModal("今週の出勤予定がありません"); return; }
        scheduleData = weekShifts;
      }
      btn.innerText = "メッセージを考案中...💭";
    }

    const route = scheduleType ? "/generate-with-schedule" : "/generate";
    const postBody = {
      mode: "diary",
      storeType:    profile.storeType    || "普通店",
      name:         profile.name         || "",
      character:    profile.character    || "",
      characters:   profile.characters   || [],
      traits:       profile.traits       || [],
      situation:    selectedSituation,
      mood:         selectedMood,
      spiceLevel:   selectedEro,
      targetLength: selectedLength === "短め" ? 140 : 220,
      emojiPalette: ["💕","🥺","✨","💦","💋","🤫","🍼","🔞"],
      customer:     profile.customerCall || "お客様",
      header:       document.getElementById("header").value.trim(),
      footer:       document.getElementById("footer").value.trim(),
      title:        title,
      scheduleType: scheduleType,
      scheduleData: scheduleData
    };

    const response = await fetch(WORKER_URL + route, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(postBody)
    });

    const data = await response.json().catch(() => ({}));
    if (!response.ok || !data.ok) {
      showModal(data.message || data.error || "生成エラー💦");
      return;
    }

    let bodyText = data.result || data.finalText || data.text || "";
    bodyText = bodyText.replace(/\r\n/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
    const fullText = "【" + title + "】\n\n" + bodyText;
    const container = document.getElementById("resultContainer");
    container.style.display = "block";
    const textarea = document.getElementById("resultTextarea");
    textarea.value = fullText;
    if (profile.textAlign === "center") { textarea.style.textAlign = "center"; }
    else { textarea.style.textAlign = "left"; }
    addToHistory(fullText);
    container.scrollIntoView({ behavior: "smooth", block: "center" });

  } catch (error) {
    console.error(error);
    showModal("通信エラー💦");
  } finally {
    btn.innerText = "日記をつくる";
    btn.disabled = false;
  }
}

function migrateHistoryIfNeeded() {
  let raw = localStorage.getItem("diaryHistory");
  if(!raw) return;
  try {
    let history = JSON.parse(raw);
    if(history.length > 0 && (typeof history[0] === "string" || !history[0].id)) {
      const newFormat = history.map(item => {
        const text = (typeof item === "string") ? item : (item.text || "");
        return { text, fav: false, id: Date.now() + Math.random() };
      });
      localStorage.setItem("diaryHistory", JSON.stringify(newFormat));
    }
  } catch(e) { localStorage.removeItem("diaryHistory"); }
}

function addToHistory(text) {
  let history = getHistory();
  history.unshift({ text, fav: false, id: Date.now() });
  if (history.length > 20) history = history.slice(0, 20);
  saveHistory(history);
  renderHistory();
}

function toggleFav(id) {
  let history = getHistory();
  const index = history.findIndex(h => h.id === id);
  if(index !== -1) {
    history[index].fav = !history[index].fav;
    saveHistory(history);
    renderHistory();
  }
}

function getHistory() { try { return JSON.parse(localStorage.getItem("diaryHistory") || "[]"); } catch(e) { return []; } }
function saveHistory(history) { localStorage.setItem("diaryHistory", JSON.stringify(history)); }

function renderHistory() {
  const history = getHistory();
  const list = document.getElementById("historyList");
  list.innerHTML = "";
  if(history.length === 0) {
    list.innerHTML = '<div style="text-align:center; font-size:12px; color:#aaa;">まだ履歴はありません</div>';
    return;
  }
  history.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    const preview = (item.text || "").split("\n")[0] || "無題";
    const heartClass = item.fav ? "active" : "";
    div.innerHTML = '<div class="history-text">' + preview + '</div><button class="fav-btn ' + heartClass + '" onclick="event.stopPropagation(); toggleFav(' + item.id + ')">♥</button>';
    div.onclick = () => {
      const container = document.getElementById("resultContainer");
      container.style.display = "block";
      const textarea = document.getElementById("resultTextarea");
      textarea.value = item.text || "";
      if (profile && profile.textAlign === "center") { textarea.style.textAlign = "center"; }
      else { textarea.style.textAlign = "left"; }
      container.scrollIntoView({ behavior: "smooth", block: "center" });
    };
    list.appendChild(div);
  });
}

function copyText() {
  const textarea = document.getElementById("resultTextarea");
  if(!textarea.value) return;
  textarea.select();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(textarea.value).then(() => showModal("コピーしました✨"));
  } else {
    document.execCommand("copy");
    showModal("コピーしました✨");
  }
}

function showModal(msg) {
  const modal = document.getElementById("modal");
  modal.innerText = msg;
  modal.style.opacity = "1";
  modal.style.top = "50%";
  setTimeout(() => { modal.style.opacity = "0"; }, 2000);
}
</script>
