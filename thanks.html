<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お礼日記をつくる</title>

<style>
html,body{ touch-action: manipulation; -webkit-text-size-adjust:100%; }
*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#fff4f8; }

.wrapper{ max-width:520px; margin:40px auto; padding:20px; animation:fadeUp .4s ease; }
@keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

h2{ margin-bottom:6px; color: #ff5fa2; }
.profileInfo{ font-size:13px; color:#888; margin-bottom:18px; min-height: 1.2em; }

.card{ background:#fff; padding:18px; border-radius:18px; margin-bottom:15px; box-shadow:0 8px 20px rgba(255,95,162,0.08); }

label{ font-size: 14px; font-weight: bold; color: #555; display: block; margin-bottom: 8px; }

input, textarea {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #eee;
  font-size:16px;
  background: #fdfdfd;
}

button.primary{ width:100%; padding:14px; border:none; border-radius:25px; background:linear-gradient(135deg,#ff5fa2,#ff85b3); color:white; margin-top:10px; font-size:14px; font-weight:bold; cursor:pointer; }
button.primary:disabled { background: #ccc; cursor: not-allowed; }

.result-container { display:none; margin-top:20px; animation:fadeResult .35s ease; }
@keyframes fadeResult{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

.choice-btn{ padding:8px 14px; border-radius:20px; border:1px solid #ffb6d2; background:#fff; cursor:pointer; font-size:13px; user-select:none; color: #ff5fa2; }

.modal{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(255, 95, 162, 0.95); color:#fff; padding:20px 30px; border-radius:25px; font-size:16px; opacity:0; transition:0.3s; pointer-events:none; z-index:1000; text-align:center; width: 80%; }

.nav-links { text-align: center; margin-top: 20px; }
.nav-links a { color: #ff85b3; text-decoration: none; font-size: 13px; margin: 0 10px; }
</style>
</head>

<body>

<div class="wrapper">
  <h2>お礼日記（LINE）</h2>
  <div class="profileInfo" id="profileInfo">読み込み中...</div>

  <div class="card">
    <label>誰へのお礼？</label>
    <input id="targetName" placeholder="例：〇〇さん、初めてのお客様">
  </div>

  <div class="card">
    <label>感謝すること・内容</label>
    <input id="thanksContent" placeholder="例：シャンパン入れてくれた、指名してくれた">
  </div>

  <button class="primary" id="generateBtn" onclick="generate()">お礼メッセージをつくる</button>

  <div class="result-container" id="resultContainer">
    <div class="card" style="background:#fff0f6; border: 1px solid #ffb6d2;">
      <label>AIが書いたメッセージ</label>
      <textarea id="resultTextarea" rows="8"></textarea>
      <div style="margin-top:10px;">
        <button class="choice-btn" onclick="copyText()">📋 コピーする</button>
      </div>
    </div>
  </div>

  <div class="nav-links">
    <a href="index.html">日記画面に戻る</a>
  </div>
</div>

<div id="modal" class="modal"></div>

<script>
let profile = null;

function loadProfile() {
  const saved = localStorage.getItem("profile");
  const infoDiv = document.getElementById("profileInfo");
  if (!saved) {
    infoDiv.innerHTML = '<b style="color:#ff5fa2;">⚠️プロフィール未登録です。</b>';
    return;
  }
  profile = JSON.parse(saved);
  infoDiv.innerText = `${profile.name}（${profile.character || "キャラ未設定"}）`;
}

function showModal(msg) {
  const modal = document.getElementById("modal");
  modal.innerText = msg;
  modal.style.opacity = "1";
  setTimeout(() => { modal.style.opacity = "0"; }, 2000);
}

async function generate() {
  const target = document.getElementById("targetName").value;
  const content = document.getElementById("thanksContent").value;

  if (!target || !content) {
    showModal("項目をすべて入力してね");
    return;
  }

  const btn = document.getElementById("generateBtn");
  btn.innerText = "執筆中...";
  btn.disabled = true;

  try {
    const workerUrl = "https://lucky-bush-6437diary-api.doropbox-kyoto.workers.dev";
    
    // シンプルな形式で送る（今のWorkerで確実に動く形）
    const response = await fetch(workerUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: `お礼メッセージを書いて。相手：${target}、内容：${content}`
      })
    });

    const data = await response.json();
    if (data.text) {
      document.getElementById("resultContainer").style.display = "block";
      document.getElementById("resultTextarea").value = data.text;
    } else {
      throw new Error("生成失敗");
    }
  } catch (error) {
    console.error(error);
    showModal("エラーが発生しました。");
  } finally {
    btn.innerText = "お礼メッセージをつくる";
    btn.disabled = false;
  }
}

function copyText() {
  const textarea = document.getElementById("resultTextarea");
  textarea.select();
  document.execCommand("copy");
  showModal("コピーしました！");
}

window.onload = loadProfile;
</script>
</body>
</html>
