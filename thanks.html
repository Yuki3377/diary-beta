<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日記生成結果</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    #result {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 12px;
      font-size: 16px;
      white-space: pre-wrap;
      min-height: 120px;
      margin-bottom: 20px;
    }

    button {
      background: #4da6ff;
      color: white;
      border: none;
      padding: 14px 24px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #3399ff;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

  <h1>日記ができました ✨</h1>

  <div id="result">生成中...</div>

  <button onclick="goHome()">もう一度つくる</button>

  <script>
    const workerURL = "https://lucky-bush-6437diary-api.doropbox-kyoto.workers.dev/";

    const prompt = localStorage.getItem("diaryPrompt");

    if (!prompt) {
      document.getElementById("result").innerText = "入力データが見つかりません。";
    } else {

      fetch(workerURL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      })
      .then(res => res.json())
      .then(data => {
        if (data.text) {
          document.getElementById("result").innerText = data.text;
        } else {
          document.getElementById("result").innerText = "エラーが発生しました。";
          console.error(data);
        }
      })
      .catch(err => {
        document.getElementById("result").innerText = "通信エラーが発生しました。";
        console.error(err);
      });
    }

    function goHome() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
